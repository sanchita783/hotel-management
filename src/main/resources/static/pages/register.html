<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Grand Hotel</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <span class="logo-icon">⬡</span>
      <span>Grand<strong>Hotel</strong></span>
    </a>
    <div class="nav-actions">
      <a href="login.html" class="btn-outline">Sign In</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-bg-shapes">
    <div class="shape s1"></div><div class="shape s2"></div><div class="shape s3"></div>
  </div>

  <div class="auth-card" style="max-width:520px">
    <div class="auth-logo"><span>⬡</span>Grand<strong>Hotel</strong></div>
    <h2>Create Account</h2>
    <p class="auth-subtitle">Join us to unlock exclusive member rates and seamless bookings</p>

    <div class="error-msg"   id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="firstName" class="form-input" placeholder="Rahul">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="lastName" class="form-input" placeholder="Sharma">
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" class="form-input" placeholder="rahul@example.com">
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" class="form-input" placeholder="9876543210">
    </div>

    <div class="form-group" style="position:relative">
      <label>Password</label>
      <input type="password" id="password" class="form-input" placeholder="Min 8 chars, uppercase, number, special">
      <button type="button" onclick="togglePwd('password')"
        style="position:absolute;right:14px;bottom:12px;background:none;border:none;cursor:pointer;color:#9ca3af">👁</button>
    </div>

    <div class="form-group" style="position:relative">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter your password">
    </div>

    <div class="form-group">
      <label>Address <span style="color:#9ca3af;font-weight:400">(optional)</span></label>
      <input type="text" id="address" class="form-input" placeholder="Your city or full address">
    </div>

    <!-- Password strength indicator -->
    <div id="pwdStrength" style="margin:-12px 0 16px;display:none">
      <div style="display:flex;gap:4px;margin-bottom:4px">
        <div id="ps1" style="flex:1;height:3px;border-radius:2px;background:#e5e7eb"></div>
        <div id="ps2" style="flex:1;height:3px;border-radius:2px;background:#e5e7eb"></div>
        <div id="ps3" style="flex:1;height:3px;border-radius:2px;background:#e5e7eb"></div>
        <div id="ps4" style="flex:1;height:3px;border-radius:2px;background:#e5e7eb"></div>
      </div>
      <span id="psLabel" style="font-size:.72rem;color:#6b7280"></span>
    </div>

    <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:20px">
      <input type="checkbox" id="terms" style="margin-top:3px;width:15px;height:15px;cursor:pointer">
      <label for="terms" style="font-size:.82rem;color:#374151;cursor:pointer">
        I agree to the <a href="#" style="color:#92400e;font-weight:600">Terms of Service</a> and
        <a href="#" style="color:#92400e;font-weight:600">Privacy Policy</a>
      </label>
    </div>

    <button class="btn-auth" id="regBtn" onclick="handleRegister()">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
  if (isLoggedIn()) window.location.href = 'dashboard.html';

  function togglePwd(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  // Password strength
  document.getElementById('password').addEventListener('input', function() {
    const v = this.value;
    if (!v) { document.getElementById('pwdStrength').style.display = 'none'; return; }
    document.getElementById('pwdStrength').style.display = 'block';
    let score = 0;
    if (v.length >= 8)        score++;
    if (/[A-Z]/.test(v))      score++;
    if (/[0-9]/.test(v))      score++;
    if (/[@$!%*?&]/.test(v))  score++;
    const colors = ['#ef4444','#f59e0b','#3b82f6','#10b981'];
    const labels = ['Weak','Fair','Good','Strong'];
    for (let i = 1; i <= 4; i++) {
      document.getElementById('ps'+i).style.background =
        i <= score ? colors[score-1] : '#e5e7eb';
    }
    const lbl = document.getElementById('psLabel');
    lbl.textContent = labels[score-1] || '';
    lbl.style.color = colors[score-1] || '#6b7280';
  });

  async function handleRegister() {
    const btn      = document.getElementById('regBtn');
    const errMsg   = document.getElementById('errorMsg');
    const succMsg  = document.getElementById('successMsg');
    errMsg.style.display = 'none';
    succMsg.style.display = 'none';

    const firstName       = document.getElementById('firstName').value.trim();
    const lastName        = document.getElementById('lastName').value.trim();
    const email           = document.getElementById('email').value.trim();
    const phone           = document.getElementById('phone').value.trim();
    const password        = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const address         = document.getElementById('address').value.trim();
    const terms           = document.getElementById('terms').checked;

    // Validate
    if (!firstName || !lastName) { showErr('First and last name are required.'); return; }
    if (!email || !/\S+@\S+\.\S+/.test(email)) { showErr('Enter a valid email address.'); return; }
    if (!phone || !/^[0-9]{10,15}$/.test(phone)) { showErr('Enter a valid 10-digit phone number.'); return; }
    if (password.length < 8) { showErr('Password must be at least 8 characters.'); return; }
    if (!/(?=.*[A-Z])(?=.*[0-9])(?=.*[@$!%*?&])/.test(password)) {
      showErr('Password must have an uppercase letter, a number, and a special character.'); return;
    }
    if (password !== confirmPassword) { showErr('Passwords do not match.'); return; }
    if (!terms) { showErr('Please accept the Terms of Service to continue.'); return; }

    btnLoading(btn, true);
    try {
      const res = await apiFetch('/auth/register', {
        method: 'POST',
        body: { firstName, lastName, email, phone, password, address }
      });

      if (res?.success) {
        setSession(res.data);
        succMsg.textContent = 'Account created! Redirecting to your dashboard…';
        succMsg.style.display = 'block';
        showToast('Welcome to Grand Hotel! 🎉', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } else {
        showErr(res?.message || 'Registration failed. Please try again.');
        btnLoading(btn, false);
      }
    } catch (e) {
      if (e.status === 409) {
        showErr('हा email आधीच registered आहे. Login करा किंवा वेगळा email वापरा.');
      } else if (e.message && !e.message.includes('fetch')) {
        showErr(e.message);
      } else {
        showErr('Connection failed. Please check if the server is running.');
      }
      btnLoading(btn, false);
    }

    function showErr(msg) {
      errMsg.textContent = msg;
      errMsg.style.display = 'block';
    }
  }
</script>
</body>
</html>
